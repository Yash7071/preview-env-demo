<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Engineering | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center border-b border-gray-700 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    <i class="fa-solid fa-server mr-2 text-blue-400"></i> Ephemeral Environment Manager
                </h1>
                <p class="text-gray-400 mt-2">Automated CI/CD Preview Dashboard</p>
            </div>
            <div class="flex items-center space-x-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-emerald-400 font-semibold tracking-wide">Orchestrator Online</span>
            </div>
        </header>

        <h2 class="text-xl font-semibold mb-6 flex items-center">
            <i class="fa-solid fa-network-wired mr-2 text-gray-400"></i> Active Deployments
        </h2>
        
        <div id="environments-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        const API_URL = 'http://43.205.194.122:3000/api/previews';
        const HOST_IP = '43.205.194.122';

        async function fetchPreviews() {
            const grid = document.getElementById('environments-grid');
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                grid.innerHTML = ''; // Clear loading state

                if(data.activePreviews.length === 0) {
                    grid.innerHTML = '<p class="text-gray-500 italic">No active preview environments currently running.</p>';
                    return;
                }

                data.activePreviews.forEach(env => {
                    const port = env.ports.match(/0\.0\.0\.0:(\d+)->/)[1]; // Extract port number from Docker format
                    const prNumber = env.name.replace('pr-', '').replace('-app', '');
                    const siteUrl = `http://${HOST_IP}:${port}`;

                    const card = `
                        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 hover:border-blue-500 transition-colors shadow-lg">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-lg font-bold text-white">Pull Request #${prNumber}</h3>
                                <span class="bg-blue-900 text-blue-300 text-xs font-bold px-2 py-1 rounded">Active</span>
                            </div>
                            <div class="space-y-2 mb-6">
                                <p class="text-sm text-gray-400"><i class="fa-brands fa-docker text-blue-400 mr-2"></i> Container: <span class="text-gray-300">${env.name}</span></p>
                                <p class="text-sm text-gray-400"><i class="fa-solid fa-plug text-emerald-400 mr-2"></i> Port Allocation: <span class="text-gray-300">${port}</span></p>
                            </div>
                            <a href="${siteUrl}" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded transition-colors">
                                <i class="fa-solid fa-arrow-up-right-from-square mr-2"></i> Open Environment
                            </a>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } catch (error) {
                grid.innerHTML = `<p class="text-red-400"><i class="fa-solid fa-triangle-exclamation mr-2"></i> Failed to connect to the Orchestrator API. Ensure port 3000 is open.</p>`;
                console.error("API Error:", error);
            }
        }

        // Fetch data immediately, then poll every 5 seconds
        fetchPreviews();
        setInterval(fetchPreviews, 5000);
    </script>
</body>
</html>
